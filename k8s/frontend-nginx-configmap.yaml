# This ConfigMap overrides the Nginx config inside the frontend pod.
# It proxies /api/v1 to the Kubernetes backend-service (not docker "backend").
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: cashex
data:
  default.conf: |
    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/v1/ {
            proxy_pass http://backend-service:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
