apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: cashex
spec:
  selector:
    app: cashex-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080 # Access app at http://<node-ip>:30080
  type: NodePort # Exposes the frontend externally
